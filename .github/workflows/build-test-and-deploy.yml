name: Build, Test, and Deploy (Rust)

on:
  workflow_dispatch:
  push:
    branches:
      - staging
      - trying
      - rust/dev
      - rust/main
    tags: "**"
  pull_request:
    branches:
      - rust/dev
      - rust/main
      - "feature/**"

# Prevent interleaving of integration test jobs on single-runner-per-arch
# self-hosted runners. A second workflow run for the same ref queues until
# the first completes rather than cancelling it.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Enable AES/SSE2 CPU features for gxhash dependency (required by PathMap crate)
  # GitHub Actions runners support these features on x86_64
  RUSTFLAGS: "-C target-feature=+aes,+sse2"

jobs:
  # Build and save artifacts for next jobs.
  # Skip release commits on branch pushes — the tag push handles the release build.
  build_base:
    name: Build Base
    runs-on: ubuntu-latest
    if: >-
      !startsWith(github.event.head_commit.message, 'chore(release)')
      || startsWith(github.ref, 'refs/tags/')
    outputs:
      VERSION: ${{ env.VERSION }}
      BRANCH: ${{ env.BRANCH }}
      DEV_LATEST_TAG: ${{ env.DEV_LATEST_TAG }}
    steps:
      - name: Clone Repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install APT Dependencies
        shell: bash -ex {0}
        run: |
          sudo apt-get update
          sudo apt-get install -y $(cat .github/apt-dependencies.txt)

      - name: Tool versions
        shell: bash -ex {0}
        run: |
          python --version
          pip --version
          rustc --version
          cargo --version

      - name: Initialize Environment
        shell: bash -exu -o pipefail {0}
        run: |
          git fetch origin
          git fetch origin --tags --force

          # Version from Git repository (tag-commit)
          VERSION="$(git describe --tags --always)"
          # Strip implementation prefix for Docker-friendly version tags
          VERSION="${VERSION#rust-}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV

          # Find latest tag on rust/dev branch, with fallback
          if git ls-remote --heads origin rust/dev 2>/dev/null | grep -q "refs/heads/rust/dev"; then
            DEV_LATEST_TAG="$(git describe --tags --abbrev=0 origin/rust/dev 2>/dev/null || echo 'unknown')"
          else
            DEV_LATEST_TAG="unknown"
          fi
          echo "DEV_LATEST_TAG=$DEV_LATEST_TAG" >> $GITHUB_ENV

          # Find related HEAD branch
          BRANCH=""
          if [[ $GITHUB_REF =~ ^refs/tags/ ]]; then
            # For tag pushes, determine release type from tag name
            # patch .0 = main release, patch > 0 = dev release
            TAG_NAME="${GITHUB_REF#refs/tags/}"
            TAG_VERSION="${TAG_NAME#rust-v}"
            PATCH=$(echo "$TAG_VERSION" | cut -d. -f3)
            if [ "$PATCH" = "0" ]; then
              BRANCH="rust/main"
            else
              BRANCH="rust/dev"
            fi
          elif [[ $GITHUB_REF =~ ^refs/heads/ ]]; then
            BRANCH=${GITHUB_REF#refs/*/}
          else
            BRANCH=$GITHUB_HEAD_REF
          fi
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV

      - name: Pack Working Tree
        shell: bash -ex {0}
        run: tar -H posix -czf /tmp/f1r3fly-worktree.tar.gz .

      - name: Save Working Tree
        uses: actions/upload-artifact@v4
        with:
          name: f1r3fly-worktree
          path: /tmp/f1r3fly-worktree.tar.gz

  required_rust_unit_tests:
    name: Required Unit Tests (Rust)
    needs: build_base
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        tests:
          - crypto
          - rholang
          - rspace++
          - shared
          - models
          - casper
          - node
          - block-storage
          - comm
          - graphz
    steps:
      - name: Clone Repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install APT Dependencies
        shell: bash -ex {0}
        run: |
          sudo apt-get update
          sudo apt-get install -y $(cat .github/apt-dependencies.txt)

      - name: Load Working Tree
        uses: actions/download-artifact@v4
        with:
          name: f1r3fly-worktree
          path: /tmp

      - name: Restore Working Tree
        shell: bash -ex {0}
        run: tar -H posix -xzf /tmp/f1r3fly-worktree.tar.gz

      - name: Run Unit Tests
        shell: bash -ex {0}
        env:
          RUSTFLAGS: "-C target-feature=+aes,+sse2 -D warnings"
          RUST_BACKTRACE: "1"
        run: |
          mkdir -p /tmp/test-logs
          pushd ${{ matrix.tests }}
          cargo test --release 2>&1 | tee /tmp/test-logs/${{ matrix.tests }}-test-output.txt
          TEST_EXIT_CODE=${PIPESTATUS[0]}
          popd
          exit $TEST_EXIT_CODE

      - name: Upload Test Logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-${{ matrix.tests }}
          path: /tmp/test-logs/
          retention-days: 7

  # Build Rust Docker image natively on each arch using self-hosted runners.
  build_rust_docker_image:
    name: Build Rust Docker Image (${{ matrix.arch }})
    needs: build_base
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            runner: [self-hosted, Linux, X64, f1r3fly-rust-ci]
            arch: amd64
          - platform: linux/arm64
            runner: [self-hosted, Linux, ARM64, f1r3fly-rust-ci]
            arch: arm64
    steps:
      - name: Clean self-hosted runner state
        shell: bash {0}
        run: |
          sudo rm -rf system-integration/integration-tests/data
          rm -rf ../artifacts /tmp/rust-node-docker.tar.gz /tmp/f1r3fly-worktree.tar.gz

      - name: Clone Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Enable Containerd Image Store
        shell: bash -ex {0}
        run: |
          sudo mkdir -p /etc/docker
          DESIRED='{"features": {"containerd-snapshotter": true}}'
          CURRENT=$(cat /etc/docker/daemon.json 2>/dev/null || echo '{}')
          if [ "$CURRENT" != "$DESIRED" ]; then
            echo "$DESIRED" | sudo tee /etc/docker/daemon.json | jq
            sudo systemctl restart docker
            echo "Docker daemon restarted (config changed)"
          else
            echo "Docker daemon config already up to date, skipping restart"
          fi

      - name: Build Docker Image
        shell: bash -ex {0}
        run: |
          docker context use default
          docker buildx build \
            --platform ${{ matrix.platform }} \
            --file node/Dockerfile \
            --tag f1r3flyindustries/f1r3fly-rust-node:${{ matrix.arch }} \
            --load \
            .

      - name: Export Docker Image
        shell: bash -ex {0}
        run: |
          mkdir -p ../artifacts
          git describe --tags --always >../artifacts/version.txt
          docker image save f1r3flyindustries/f1r3fly-rust-node:${{ matrix.arch }} \
              | gzip > /tmp/rust-node-docker.tar.gz

      - name: Save Docker Image
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-docker-${{ matrix.arch }}
          path: /tmp/rust-node-docker.tar.gz

  # Integration tests on OCI self-hosted runners (one runner per arch).
  # All tests run in a single pytest invocation per arch, matching local dev
  # workflow. The static shard boots once and stays up for all shard tests;
  # custom shard tests boot/teardown their own shards per-test.
  required_rust_integration_tests:
    name: Integration Tests (${{ matrix.arch }})
    needs: build_rust_docker_image
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: [self-hosted, Linux, X64, f1r3fly-rust-ci]
          - arch: arm64
            runner: [self-hosted, Linux, ARM64, f1r3fly-rust-ci]
    steps:
      - name: Clean self-hosted runner state
        shell: bash {0}
        run: |
          sudo rm -rf system-integration/integration-tests/data
          rm -f /tmp/rust-node-docker.tar.gz /tmp/*.log

      - name: Clone Repository
        uses: actions/checkout@v4

      - name: Clone system-integration
        uses: actions/checkout@v4
        with:
          repository: F1R3FLY-io/system-integration
          # TODO: revert to main once system-integration PR #47 is merged
          ref: feature/robust-lfb-assertion
          path: system-integration

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: 'pip'

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 1.8.5
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Load Docker Image
        uses: actions/download-artifact@v4
        with:
          name: artifacts-docker-${{ matrix.arch }}
          path: /tmp

      - name: Import Docker Image
        shell: bash -ex {0}
        run: |
          zcat /tmp/rust-node-docker.tar.gz | docker image load
          docker tag f1r3flyindustries/f1r3fly-rust-node:${{ matrix.arch }} f1r3flyindustries/f1r3fly-rust-node

      - name: Install docker-compose
        shell: bash -ex {0}
        run: |
          if ! command -v docker-compose &>/dev/null; then
            sudo curl -L "https://github.com/docker/compose/releases/download/v2.32.4/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
            sudo chmod +x /usr/local/bin/docker-compose
          fi
          docker-compose --version

      - name: Reset Docker networking
        shell: bash {0}
        run: |
          docker rm -f $(docker ps -aq) 2>/dev/null || true
          docker network prune -f 2>/dev/null || true
          echo "Restarting Docker daemon to clear any TIME_WAIT sockets from previous runs"
          sudo systemctl restart docker
          sleep 3

      - name: Install system-integration dependencies
        shell: bash -ex {0}
        run: |
          cd system-integration
          poetry lock --no-update
          poetry install --with integration

      - name: Run Integration Tests
        shell: bash -ex {0}
        env:
          DEFAULT_IMAGE: f1r3flyindustries/f1r3fly-rust-node
        run: |
          cd system-integration
          SCALE_FLAG=""
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            SCALE_FLAG="--timeout-scale=1.5"
          fi
          poetry run pytest \
            integration-tests/test/test_web_api.py \
            integration-tests/test/test_wallets.py \
            integration-tests/test/test_heartbeat.py \
            integration-tests/test/test_deployment.py \
            integration-tests/test/test_storage.py \
            integration-tests/test/test_genesis_ceremony.py \
            integration-tests/test/test_dag_correctness.py \
            integration-tests/test/test_finalization.py \
            integration-tests/test/test_propose.py \
            integration-tests/test/test_replay_determinism.py \
            integration-tests/test/test_bridge_admin.py \
            integration-tests/test/test_consensus_health.py \
            integration-tests/test/test_synchrony_constraint.py \
            integration-tests/test/test_asymmetric_bonds.py \
            integration-tests/test/test_bonding_validators.py \
            integration-tests/test/test_trim_state.py \
            -v --tb=short --log-cli-level=WARNING \
            -n 3 --dist=loadgroup \
            --startup-timeout=600 --command-timeout=300 --timeout=600 $SCALE_FLAG \
            --deselect=integration-tests/test/test_replay_determinism.py::test_network_recovers_from_slow_deploy  # TODO: re-enable once LFB convergence after phlo-exhausting deploys is fixed

      - name: Upload Integration Test Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-logs-${{ matrix.arch }}
          path: system-integration/integration-tests/
          retention-days: 7

      - name: Upload Docker Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docker-logs-${{ matrix.arch }}
          path: /tmp/*.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Clean Docker state
        if: always()
        shell: bash {0}
        run: |
          docker rm -f rnode.bootstrap rnode.validator1 rnode.validator2 rnode.validator3 rnode.readonly \
            rnode.standalone rnode.custom.boot rnode.custom.validator1 rnode.custom.validator2 \
            rnode.custom.validator3 rnode.custom.joiner 2>/dev/null
          docker network rm f1r3fly-shard_f1r3fly-test-shard f1r3fly-standalone_f1r3fly-test-standalone f1r3fly-custom_f1r3fly-test-custom 2>/dev/null
          sudo rm -rf system-integration/integration-tests/data

  # ===========================================================================
  # Smoke Tests — verify README startup instructions work
  # ===========================================================================

  smoke_docker_standalone:
    name: Smoke Test (Docker Standalone)
    needs: build_rust_docker_image
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Clone Repository
        uses: actions/checkout@v4

      - name: Load Docker Image
        uses: actions/download-artifact@v4
        with:
          name: artifacts-docker-amd64
          path: /tmp

      - name: Import Docker Image
        shell: bash -ex {0}
        run: |
          zcat /tmp/rust-node-docker.tar.gz | docker image load
          docker tag f1r3flyindustries/f1r3fly-rust-node:amd64 f1r3flyindustries/f1r3fly-rust-node

      - name: Start standalone node
        shell: bash -ex {0}
        run: docker compose -f docker/standalone.yml up -d

      - name: Wait for Running state
        shell: bash -ex {0}
        run: |
          for i in $(seq 1 60); do
            if docker compose -f docker/standalone.yml logs 2>&1 | grep -q "Making a transition to Running state"; then
              echo "Node reached Running state"
              break
            fi
            echo "  [${i}] Waiting for Running state..."
            sleep 5
          done
          docker compose -f docker/standalone.yml logs 2>&1 | grep "Making a transition to Running state" || (echo "FAIL: Node did not reach Running state" && exit 1)

      - name: Verify HTTP API
        shell: bash -ex {0}
        run: curl -sf http://localhost:40403/api/status

      - name: Wait for 10 finalized blocks
        shell: bash -ex {0}
        run: |
          for i in $(seq 1 60); do
            LFB=$(curl -sf http://localhost:40403/api/last-finalized-block 2>/dev/null | python3 -c "import sys,json; print(json.load(sys.stdin).get('blockInfo',{}).get('blockNumber',0))" 2>/dev/null || echo 0)
            echo "  [$((i*5))s] LFB: #$LFB"
            if [ "$LFB" -ge 10 ] 2>/dev/null; then
              echo "Reached LFB #$LFB"
              break
            fi
            sleep 5
          done
          [ "$LFB" -ge 10 ] 2>/dev/null || (echo "FAIL: LFB only at #$LFB after 300s" && exit 1)

      - name: Collect logs
        if: always()
        shell: bash {0}
        run: |
          mkdir -p /tmp/logs
          docker ps -a > /tmp/logs/containers.txt 2>&1 || true
          for c in $(docker ps -aq --filter "name=rnode" 2>/dev/null); do
            name=$(docker inspect --format '{{.Name}}' "$c" | sed 's|^/||')
            docker logs "$c" > "/tmp/logs/${name}.log" 2>&1 || true
          done

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-logs-docker-standalone
          path: /tmp/logs/
          retention-days: 7

      - name: Cleanup
        if: always()
        shell: bash {0}
        run: docker compose -f docker/standalone.yml down -v

  smoke_docker_shard:
    name: Smoke Test (Docker Shard)
    needs: build_rust_docker_image
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Clone Repository
        uses: actions/checkout@v4

      - name: Load Docker Image
        uses: actions/download-artifact@v4
        with:
          name: artifacts-docker-amd64
          path: /tmp

      - name: Import Docker Image
        shell: bash -ex {0}
        run: |
          zcat /tmp/rust-node-docker.tar.gz | docker image load
          docker tag f1r3flyindustries/f1r3fly-rust-node:amd64 f1r3flyindustries/f1r3fly-rust-node

      - name: Start shard
        shell: bash -ex {0}
        run: docker compose -f docker/shard.yml up -d

      - name: Wait for all nodes Running
        shell: bash -ex {0}
        run: |
          EXPECTED=4  # 3 validators + bootstrap (readonly doesn't log this)
          for i in $(seq 1 60); do
            COUNT=$(docker compose -f docker/shard.yml logs 2>&1 | grep -c "Making a transition to Running state" || echo 0)
            echo "  [${i}] $COUNT/$EXPECTED nodes Running"
            if [ "$COUNT" -ge "$EXPECTED" ]; then
              echo "All nodes reached Running state"
              break
            fi
            sleep 5
          done
          COUNT=$(docker compose -f docker/shard.yml logs 2>&1 | grep -c "Making a transition to Running state" || echo 0)
          [ "$COUNT" -ge "$EXPECTED" ] || (echo "FAIL: Only $COUNT/$EXPECTED nodes Running" && exit 1)

      - name: Verify validator1 HTTP API
        shell: bash -ex {0}
        run: curl -sf http://localhost:40413/api/status

      - name: Verify readonly HTTP API
        shell: bash -ex {0}
        run: curl -sf http://localhost:40453/api/status

      - name: Wait for 10 finalized blocks
        shell: bash -ex {0}
        run: |
          for i in $(seq 1 60); do
            LFB=$(curl -sf http://localhost:40413/api/last-finalized-block 2>/dev/null | python3 -c "import sys,json; print(json.load(sys.stdin).get('blockInfo',{}).get('blockNumber',0))" 2>/dev/null || echo 0)
            echo "  [$((i*5))s] LFB: #$LFB"
            if [ "$LFB" -ge 10 ] 2>/dev/null; then
              echo "Reached LFB #$LFB"
              break
            fi
            sleep 5
          done
          [ "$LFB" -ge 10 ] 2>/dev/null || (echo "FAIL: LFB only at #$LFB after 300s" && exit 1)

      - name: Start monitoring
        shell: bash -ex {0}
        run: |
          docker compose -f docker/shard-monitoring.yml up -d
          sleep 20

      - name: Verify monitoring stack
        shell: bash -ex {0}
        run: |
          echo "--- Prometheus targets ---"
          curl -sf http://localhost:9090/api/v1/targets | python3 -c "
          import sys,json; t=json.load(sys.stdin)['data']['activeTargets']
          up=sum(1 for x in t if x['health']=='up')
          down=sum(1 for x in t if x['health']=='down')
          [print(f'  {x[\"labels\"].get(\"instance\",x[\"labels\"].get(\"job\",\"?\"))}: {x[\"health\"]}') for x in t]
          print(f'UP={up} DOWN={down}')
          assert up >= 5, f'expected >=5 UP targets, got {up}'
          assert down == 0, f'expected 0 DOWN targets, got {down}'
          "

          echo "--- Grafana health ---"
          curl -sf http://localhost:3000/api/health

          echo "--- Grafana dashboards ---"
          curl -sf -u admin:admin http://localhost:3000/api/search | python3 -c "
          import sys,json; ds=json.load(sys.stdin)
          [print(f'  {d[\"title\"]}') for d in ds]
          assert len(ds) >= 1, f'expected >=1 dashboard, got {len(ds)}'
          "

      - name: Collect logs
        if: always()
        shell: bash {0}
        run: |
          mkdir -p /tmp/logs
          docker ps -a > /tmp/logs/containers.txt 2>&1 || true
          for c in $(docker ps -aq --filter "name=rnode" 2>/dev/null); do
            name=$(docker inspect --format '{{.Name}}' "$c" | sed 's|^/||')
            docker logs "$c" > "/tmp/logs/${name}.log" 2>&1 || true
          done

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-logs-docker-shard
          path: /tmp/logs/
          retention-days: 7

      - name: Cleanup
        if: always()
        shell: bash {0}
        run: |
          docker compose -f docker/shard-monitoring.yml down 2>/dev/null || true
          docker compose -f docker/shard.yml down -v

  smoke_local_standalone:
    name: Smoke Test (Local Standalone)
    needs: build_rust_docker_image
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Clone Repository
        uses: actions/checkout@v4

      - name: Install just
        shell: bash -ex {0}
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://just.systems/install.sh | bash -s -- --to /usr/local/bin

      - name: Load Docker Image
        uses: actions/download-artifact@v4
        with:
          name: artifacts-docker-amd64
          path: /tmp

      - name: Extract node binary from Docker image
        shell: bash -ex {0}
        run: |
          zcat /tmp/rust-node-docker.tar.gz | docker image load
          CONTAINER_ID=$(docker create f1r3flyindustries/f1r3fly-rust-node:amd64)
          mkdir -p target/release
          docker cp "$CONTAINER_ID:/opt/docker/bin/node" ./target/release/node
          docker rm "$CONTAINER_ID"
          chmod +x ./target/release/node

      - name: Setup standalone data
        shell: bash -ex {0}
        run: just setup-standalone

      - name: Start standalone node
        shell: bash -ex {0}
        run: |
          ./target/release/node run -s \
            --config-file=run-local/conf/standalone.conf \
            --validator-private-key=5f668a7ee96d944a4494cc947e4005e172d7ab3461ee5538f1f2a45a835e9657 \
            --host=localhost \
            --no-upnp \
            > /tmp/node-stdout.log 2>&1 &
          echo $! > /tmp/node.pid
          echo "Node started with PID $(cat /tmp/node.pid)"

      - name: Wait for Running state
        shell: bash -ex {0}
        run: |
          for i in $(seq 1 60); do
            if grep -q "Making a transition to Running state" /tmp/node-stdout.log 2>/dev/null; then
              echo "Node reached Running state"
              break
            fi
            echo "  [${i}] Waiting for Running state..."
            sleep 5
          done
          grep -q "Making a transition to Running state" /tmp/node-stdout.log || (echo "FAIL: Node did not reach Running state" && cat /tmp/node-stdout.log && exit 1)

      - name: Verify HTTP API
        shell: bash -ex {0}
        run: curl -sf http://localhost:40403/api/status

      - name: Wait for 10 finalized blocks
        shell: bash -ex {0}
        run: |
          for i in $(seq 1 60); do
            LFB=$(curl -sf http://localhost:40403/api/last-finalized-block 2>/dev/null | python3 -c "import sys,json; print(json.load(sys.stdin).get('blockInfo',{}).get('blockNumber',0))" 2>/dev/null || echo 0)
            echo "  [$((i*5))s] LFB: #$LFB"
            if [ "$LFB" -ge 10 ] 2>/dev/null; then
              echo "Reached LFB #$LFB"
              break
            fi
            sleep 5
          done
          [ "$LFB" -ge 10 ] 2>/dev/null || (echo "FAIL: LFB only at #$LFB after 300s" && exit 1)

      - name: Collect logs
        if: always()
        shell: bash {0}
        run: |
          mkdir -p /tmp/logs
          cp /tmp/node-stdout.log /tmp/logs/ 2>/dev/null || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-logs-local-standalone
          path: /tmp/logs/
          retention-days: 7

      - name: Cleanup
        if: always()
        shell: bash {0}
        run: |
          kill $(cat /tmp/node.pid) 2>/dev/null || true
          just clean-standalone 2>/dev/null || true

  # release_* jobs make built artifacts available to public and run only on new
  # tags or pushes to "staging" or "trying" branches used by Bors (bors r+ and bors try).
  # These jobs require secrets! See "env" variables and "Secrets" page in GitHub repository
  # settings. Release destinations differ slightly depending on the event that
  # triggered the job (tag or branch push). See "Publish ..." steps for details.
  # VERSION and BRANCH are used from "build_base" job outputs as a new way to share
  # data between jobs and steps. Legacy "version" via artifact file is still used.

  # Upload Rust Docker image to Docker Hub (multi-arch manifest).
  release_rust_docker_image:
    name: Release Rust Docker Image
    needs:
      - required_rust_unit_tests
      - required_rust_integration_tests
      - build_rust_docker_image
      - build_base
    if: >-
      github.event_name == 'push' && (startsWith(github.ref, 'refs/tags/') ||
      github.ref == 'refs/heads/trying' ||
      github.ref == 'refs/heads/staging' ||
      github.ref == 'refs/heads/rust/main' ||
      github.ref == 'refs/heads/rust/dev')
    runs-on: ubuntu-latest
    steps:
      - name: Load AMD64 Docker Image
        uses: actions/download-artifact@v4
        with:
          name: artifacts-docker-amd64
          path: /tmp/amd64

      - name: Import AMD64 Docker Image
        shell: bash -ex {0}
        run: zcat /tmp/amd64/rust-node-docker.tar.gz | docker image load

      - name: Load ARM64 Docker Image
        uses: actions/download-artifact@v4
        with:
          name: artifacts-docker-arm64
          path: /tmp/arm64

      - name: Import ARM64 Docker Image
        shell: bash -ex {0}
        run: zcat /tmp/arm64/rust-node-docker.tar.gz | docker image load

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Publish Docker Image
        env:
          VERSION: ${{ needs.build_base.outputs.VERSION }}
          BRANCH: ${{ needs.build_base.outputs.BRANCH }}
          DEV_LATEST_TAG: ${{ needs.build_base.outputs.DEV_LATEST_TAG }}
        shell: bash -exu -o pipefail {0}
        run: |
          DOCKER_IMAGE_NAME="f1r3flyindustries/f1r3fly-rust-node"
          SOURCE_AMD64="${DOCKER_IMAGE_NAME}:amd64"
          SOURCE_ARM64="${DOCKER_IMAGE_NAME}:arm64"

          SUFFIX=""
          CI_RUN=""
          TAG_PREFIX=""
          IS_TAG_PUSH="false"

          if [[ $GITHUB_REF =~ ^refs/tags/ ]]; then
            IS_TAG_PUSH="true"
          fi

          # Add suffix if trying or merging
          if [[ "$BRANCH" =~ ^(trying|staging)$ ]]; then
            SUFFIX="-$BRANCH"

            # Add CI run number if trying
            if [[ $BRANCH =~ ^trying$ ]]; then
              CI_RUN="-ci-$GITHUB_RUN_NUMBER"
            fi
          elif [[ "$BRANCH" == "rust/dev" && "$IS_TAG_PUSH" == "false" ]]; then
            # Only prefix dev- for branch pushes (commit hashes), not tag releases
            TAG_PREFIX="dev-"
          fi

          set -x

          IMAGE_NAME="$DOCKER_IMAGE_NAME$SUFFIX"
          IMG_VERSION_RAW="$IMAGE_NAME:${TAG_PREFIX}$VERSION$CI_RUN"
          # Replace unsupported character `+`
          IMG_VERSION="${IMG_VERSION_RAW//[+]/__}"
          if [[ "$BRANCH" == "rust/dev" ]]; then
            IMG_LATEST="$IMAGE_NAME:dev"
          else
            IMG_LATEST="$IMAGE_NAME:latest"
          fi

          # Tag and push arch-specific images
          docker tag $SOURCE_AMD64 $IMG_VERSION-amd64
          docker tag $SOURCE_ARM64 $IMG_VERSION-arm64
          docker push $IMG_VERSION-amd64
          docker push $IMG_VERSION-arm64

          docker tag $SOURCE_AMD64 $IMG_LATEST-amd64
          docker tag $SOURCE_ARM64 $IMG_LATEST-arm64
          docker push $IMG_LATEST-amd64
          docker push $IMG_LATEST-arm64

          # Create and push multi-arch manifests
          docker manifest create $IMG_VERSION --amend $IMG_VERSION-amd64 $IMG_VERSION-arm64
          docker manifest push $IMG_VERSION

          docker manifest create $IMG_LATEST --amend $IMG_LATEST-amd64 $IMG_LATEST-arm64
          docker manifest push $IMG_LATEST

  # GitHub (create) release and packages
  release_packages:
    name: Release Packages
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/rust-v')
    permissions:
      contents: write # Required for creating/updating releases
    needs:
      - required_rust_unit_tests
      - required_rust_integration_tests
      - build_rust_docker_image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (for CHANGELOG.md)
        uses: actions/checkout@v4

      - name: Load Docker artifact (amd64)
        uses: actions/download-artifact@v4
        with:
          name: artifacts-docker-amd64
          path: /tmp/artifacts

      - name: Extract node binary from Docker image
        run: |
          zcat /tmp/artifacts/rust-node-docker.tar.gz | docker image load
          CONTAINER_ID=$(docker create f1r3flyindustries/f1r3fly-rust-node:amd64)
          docker cp "$CONTAINER_ID:/opt/docker/bin/node" /tmp/artifacts/f1r3node-linux-amd64
          docker rm "$CONTAINER_ID"
          test -f /tmp/artifacts/f1r3node-linux-amd64 || { echo 'Binary extraction failed'; exit 1; }

      - name: Determine release type
        id: release_type
        run: |
          TAG="${GITHUB_REF#refs/tags/rust-v}"
          PATCH=$(echo "$TAG" | cut -d. -f3)
          if [ "$PATCH" = "0" ]; then
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract release notes for this version
        run: |
          # Extract only the latest version section from CHANGELOG.md
          awk '/^## \[/{if(found) exit; found=1} found' CHANGELOG.md > RELEASE_NOTES.md

      - name: Update release and release artifacts
        uses: ncipollo/release-action@v1
        with:
          artifacts: /tmp/artifacts/*
          prerelease: ${{ steps.release_type.outputs.prerelease }}
          draft: false
          allowUpdates: true
          omitBodyDuringUpdate: true
          bodyFile: RELEASE_NOTES.md
          token: ${{ secrets.GITHUB_TOKEN }}
