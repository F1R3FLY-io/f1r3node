# Scala release — auto-bumps version on merge to main or dev
#
# - main: bumps minor (0.4.0 → 0.5.0)
# - dev: bumps patch (0.4.0 → 0.4.1)
#
# Determines the next version from the latest scala-v* tag, bumps version.sbt,
# generates CHANGELOG.md via git-cliff, commits, and pushes. The tag is created
# via the GitHub API with a PAT so it triggers the existing CI workflow for
# Docker release and package publishing.
#
# Commit push uses GITHUB_TOKEN (no workflow triggers).
# Tag creation uses RELEASE_PAT (triggers on:push:tags workflows).

name: Release (Scala)

on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:

jobs:
  release:
    name: Bump Version & Tag
    runs-on: ubuntu-22.04
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (!startsWith(github.event.head_commit.message, 'chore(release)')
      && !startsWith(github.event.head_commit.message, 'chore: prepare next development cycle'))
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Force-refresh tags
        run: git fetch origin --tags --force

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install git-cliff
        uses: orhun/git-cliff-action@v4
        with:
          args: --version

      - name: Determine next version
        id: version
        run: |
          source scripts/version.sh
          BRANCH="${GITHUB_REF#refs/heads/}"
          if [ "$BRANCH" = "main" ]; then
            bump_version minor
          else
            bump_version patch
          fi
          echo "NEXT_VERSION=$NEXT_VERSION" >> "$GITHUB_OUTPUT"
          echo "TAG_NAME=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "BRANCH=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "Next version: $NEXT_VERSION (tag: $TAG_NAME) [branch: $BRANCH]"

      - name: Update version.sbt
        run: |
          echo "ThisBuild / version := \"${{ steps.version.outputs.NEXT_VERSION }}\"" > version.sbt

      - name: Generate CHANGELOG
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --tag ${{ steps.version.outputs.TAG_NAME }} -o CHANGELOG.md

      - name: Commit release
        id: release_commit
        run: |
          git add version.sbt CHANGELOG.md
          git commit -m "chore(release): scala v${{ steps.version.outputs.NEXT_VERSION }}"
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Prepare next development cycle
        if: steps.version.outputs.BRANCH == 'main'
        run: |
          NEXT="${{ steps.version.outputs.NEXT_VERSION }}"
          MAJOR=$(echo "$NEXT" | cut -d. -f1)
          MINOR=$(echo "$NEXT" | cut -d. -f2)
          DEV_MINOR=$((MINOR + 1))
          DEV_VERSION="${MAJOR}.${DEV_MINOR}.0-SNAPSHOT"
          echo "ThisBuild / version := \"${DEV_VERSION}\"" > version.sbt
          git add version.sbt
          git commit -m "chore: prepare next development cycle (${DEV_VERSION})"

      - name: Push commits (GITHUB_TOKEN — no workflow triggers)
        run: |
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git push origin ${{ steps.version.outputs.BRANCH }}

      - name: Create tag via API (PAT — triggers downstream CI)
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.RELEASE_PAT }}
          script: |
            const tagName = '${{ steps.version.outputs.TAG_NAME }}';
            const sha = '${{ github.sha }}';

            // Use the release commit SHA (before SNAPSHOT commit)
            const commitSha = '${{ steps.release_commit.outputs.sha }}';

            // Create annotated tag object
            const tagObject = await github.rest.git.createTag({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag: tagName,
              message: `Release ${tagName}`,
              object: commitSha,
              type: 'commit'
            });

            // Create tag reference
            await github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `refs/tags/${tagName}`,
              sha: tagObject.data.sha
            });

            console.log(`Created tag ${tagName} -> ${commitSha}`);
