# Override configuration for leak-isolation runs.
# This file is intentionally minimal and merges onto defaults.conf,
# flipping proposer heartbeat off while keeping all other shared defaults.
casper {
  # Keep proposal cadence aggressive for latency targets.
  casper-loop-interval = 1 seconds

  # Shorter requested-block timeout keeps retrieval pressure bounded under churn.
  requested-blocks-timeout = 3 seconds

  heartbeat {
    enabled = false
  }
}

metrics {
  prometheus = true
}
