# Override for profiling latency runs.
metrics {
  prometheus = true
}

casper {
  fault-tolerance-threshold = 0.0
  casper-loop-interval = 750 ms
  requested-blocks-timeout = 1 s

  heartbeat {
    enabled = true
    check-interval = 250 ms
    max-lfb-age = 500 ms
  }

  # Keep synchrony threshold at 2/3 for consensus security.
  synchrony-constraint-threshold = 0.67

  disable-late-block-filtering = true

  # Ensure genesis validator nodes use the same genesis contract terms as bootstrap.
  genesis-block-data {
    genesis-data-dir = ${storage.data-dir}/genesis
    bonds-file = ${casper.genesis-block-data.genesis-data-dir}/bonds.txt
    wallets-file = ${casper.genesis-block-data.genesis-data-dir}/wallets.txt
    bond-minimum = 1
    bond-maximum = 9223372036854775807
    epoch-length = 10
    quarantine-length = 10
    number-of-active-validators = 100
    genesis-block-number = 0
    pos-multi-sig-public-keys = [
      04fa70d7be5eb750e0915c0f6d19e7085d18bb1c22d030feb2a877ca2cd226d04438aa819359c56c720142fbc66e9da03a5ab960a3d8b75363a226b7c800f60420,
      04837a4cff833e3157e3135d7b40b8e1f33c6e6b5a4342b9fc784230ca4c4f9d356f258debef56ad4984726d6ab3e7709e1632ef079b4bcd653db00b68b2df065f,
      0457febafcc25dd34ca5e5c025cd445f60e5ea6918931a54eb8c3a204f51760248090b0c757c2bdad7b8c4dca757e109f8ef64737d90712724c8216c94b4ae661c
    ]
    pos-multi-sig-quorum = 2
  }

  # Reduce parent fanout for local latency tuning.
  max-number-of-parents = 4
  max-parent-depth = 64

  # Use safe background GC for mergeable channels in multi-parent mode.
  # Immediate delete on finalization can remove still-needed mergeable data.
  enable-mergeable-channel-gc = true
  mergeable-channels-gc-interval = 5 minutes
  mergeable-channels-gc-depth-buffer = 10

  genesis-ceremony {
    required-signatures = 2
    approve-interval = 1 seconds
    approve-duration = 5 seconds
    autogen-shard-size = 5
    genesis-validator-mode = true
    ceremony-master-mode = false
  }
}
