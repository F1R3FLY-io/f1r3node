x-rnode: &default-rnode
  image: f1r3fly-rust-node:local
  user: root
  networks:
    - f1r3fly
  environment:
    - OPENAI_ENABLED=${OPENAI_ENABLED}
    - OPENAI_SCALA_CLIENT_API_KEY=${OPENAI_SCALA_CLIENT_API_KEY}
    # Limit glibc arena proliferation and return freed heap pages faster.
    - MALLOC_ARENA_MAX=2
    - MALLOC_TRIM_THRESHOLD_=131072
    - MALLOC_MMAP_THRESHOLD_=131072
    - F1R3_MALLOC_TRIM_EVERY_BLOCKS=${F1R3_MALLOC_TRIM_EVERY_BLOCKS:-8}
    - F1R3_SYNCHRONY_RECOVERY_STALL_WINDOW_SECONDS=${F1R3_SYNCHRONY_RECOVERY_STALL_WINDOW_SECONDS:-8}
    - F1R3_SYNCHRONY_RECOVERY_COOLDOWN_SECONDS=${F1R3_SYNCHRONY_RECOVERY_COOLDOWN_SECONDS:-20}
    - F1R3_SYNCHRONY_RECOVERY_MAX_BYPASSES=${F1R3_SYNCHRONY_RECOVERY_MAX_BYPASSES:-2}
    - F1R3_SYNCHRONY_CONSTRAINT_THRESHOLD=${F1R3_SYNCHRONY_CONSTRAINT_THRESHOLD:-0.67}
    - F1R3_BLOCK_RETRIEVER_DEDUP_QUERIED_PEERS=${F1R3_BLOCK_RETRIEVER_DEDUP_QUERIED_PEERS:-0}
    - F1R3_BLOCK_RETRIEVER_PEER_REQUERY_COOLDOWN_MS=${F1R3_BLOCK_RETRIEVER_PEER_REQUERY_COOLDOWN_MS:-250}
    - F1R3_BLOCK_RETRIEVER_BROADCAST_ONLY_COOLDOWN_MS=${F1R3_BLOCK_RETRIEVER_BROADCAST_ONLY_COOLDOWN_MS:-500}
    - F1R3_BLOCK_RETRIEVER_DEPENDENCY_RECOVERY_COOLDOWN_MS=${F1R3_BLOCK_RETRIEVER_DEPENDENCY_RECOVERY_COOLDOWN_MS:-2000}
    - F1R3_BLOCK_RETRIEVER_STALE_REQUEST_LIFETIME_MULTIPLIER=${F1R3_BLOCK_RETRIEVER_STALE_REQUEST_LIFETIME_MULTIPLIER:-3}
    - F1R3_BLOCK_RETRIEVER_MAX_RETRIES_PER_HASH=${F1R3_BLOCK_RETRIEVER_MAX_RETRIES_PER_HASH:-8}
    - F1R3_BLOCK_RETRIEVER_KNOWN_PEER_REQUERY_SOFT_LIMIT=${F1R3_BLOCK_RETRIEVER_KNOWN_PEER_REQUERY_SOFT_LIMIT:-4}
    - F1R3_BLOCK_RETRIEVER_MIN_REREQUEST_INTERVAL_MS=${F1R3_BLOCK_RETRIEVER_MIN_REREQUEST_INTERVAL_MS:-500}
    - F1R3_BLOCK_RETRIEVER_RETRY_BUDGET_QUARANTINE_MS=${F1R3_BLOCK_RETRIEVER_RETRY_BUDGET_QUARANTINE_MS:-120000}
    - F1R3_MISSING_DEPENDENCY_ATTEMPTS_MAX=${F1R3_MISSING_DEPENDENCY_ATTEMPTS_MAX:-8}
    - F1R3_MISSING_DEPENDENCY_QUARANTINE_MS=${F1R3_MISSING_DEPENDENCY_QUARANTINE_MS:-16000}
    - F1R3_CASPER_BUFFER_MAX_APPROX_NODES=${F1R3_CASPER_BUFFER_MAX_APPROX_NODES:-16384}
    - F1R3_CASPER_BUFFER_STALE_TTL_MS=${F1R3_CASPER_BUFFER_STALE_TTL_MS:-180000}
    - F1R3_CASPER_BUFFER_MAX_PRUNE_BATCH=${F1R3_CASPER_BUFFER_MAX_PRUNE_BATCH:-512}
    - F1R3_CASPER_BUFFER_PRUNE_INTERVAL_MS=${F1R3_CASPER_BUFFER_PRUNE_INTERVAL_MS:-5000}
    - F1R3_GENESIS_SEEN_CANDIDATES_MAX_ENTRIES=${F1R3_GENESIS_SEEN_CANDIDATES_MAX_ENTRIES:-4096}
    - F1R3_BLOCK_INDEX_CACHE_MAX_ENTRIES=${F1R3_BLOCK_INDEX_CACHE_MAX_ENTRIES:-32}
    - F1R3_PARENTS_POST_STATE_CACHE_MAX_ENTRIES=${F1R3_PARENTS_POST_STATE_CACHE_MAX_ENTRIES:-64}
    - F1R3_REPLAY_CACHE_MAX_ENTRIES=${F1R3_REPLAY_CACHE_MAX_ENTRIES:-192}
    - F1R3_REPLAY_CACHE_MAX_EVENT_LOG_ENTRIES=${F1R3_REPLAY_CACHE_MAX_EVENT_LOG_ENTRIES:-1536}
    - F1R3_BLOCK_PROTO_DECODE_BUFFER_BYTES=${F1R3_BLOCK_PROTO_DECODE_BUFFER_BYTES:-65536}
    - F1R3_FINALIZER_WORK_BUDGET_MS=${F1R3_FINALIZER_WORK_BUDGET_MS:-8000}
    - F1R3_FINALIZER_STEP_TIMEOUT_MS=${F1R3_FINALIZER_STEP_TIMEOUT_MS:-500}
    - F1R3_FINALIZER_CATCHUP_WORK_BUDGET_MS=${F1R3_FINALIZER_CATCHUP_WORK_BUDGET_MS:-8000}
    - F1R3_FINALIZER_CATCHUP_STEP_TIMEOUT_MS=${F1R3_FINALIZER_CATCHUP_STEP_TIMEOUT_MS:-500}
    - F1R3_BLOCK_STORE_DEPLOY_SIG_CACHE_MAX_ENTRIES=${F1R3_BLOCK_STORE_DEPLOY_SIG_CACHE_MAX_ENTRIES:-1024}
    - F1R3_FINALIZER_MAX_CLIQUE_CANDIDATES=${F1R3_FINALIZER_MAX_CLIQUE_CANDIDATES:-128}
    - F1R3_FINALIZER_CANDIDATE_RANKING=${F1R3_FINALIZER_CANDIDATE_RANKING:-recency_smallset_stake}

services:
  boot:
    <<: *default-rnode
    container_name: $BOOTSTRAP_HOST
    restart: always
    command:
      [
        "run",
        "--host=$BOOTSTRAP_HOST",
        "--bootstrap=rnode://$BOOTSTRAP_NODE_ID@$BOOTSTRAP_HOST?protocol=40400&discovery=40404", # node will know it's bootstrap node
        "--allow-private-addresses",
        "--validator-private-key=$BOOTSTRAP_PRIVATE_KEY",
#        "--genesis-validator",
      ]
    ports:
      - "40400:40400"
      - "40401:40401"
      - "40402:40402"
      - "40403:40403"
      - "40404:40404"
      - "40405:40405"
    volumes:
      # Node-specific volumes
      - ./data/$BOOTSTRAP_HOST:/var/lib/rnode/
      # Bootstrap-specific configuration (ceremony master)
      - ./conf/bootstrap-ceremony.conf:/var/lib/rnode/rnode.conf
      - ./genesis/wallets.txt:/var/lib/rnode/genesis/wallets.txt
      - ./genesis/bonds.txt:/var/lib/rnode/genesis/bonds.txt
      - ./conf/logback.xml:/var/lib/rnode/logback.xml
      - ./certs/bootstrap/node.certificate.pem:/var/lib/rnode/node.certificate.pem:ro
      - ./certs/bootstrap/node.key.pem:/var/lib/rnode/node.key.pem:ro

  validator1:
    <<: *default-rnode
    container_name: $VALIDATOR1_HOST
    restart: always
    command:
      [
        "run",
        "--host=$VALIDATOR1_HOST",
        "--allow-private-addresses",
        "--bootstrap=rnode://$BOOTSTRAP_NODE_ID@$BOOTSTRAP_HOST?protocol=40400&discovery=40404",
        "--validator-public-key=$VALIDATOR1_PUBLIC_KEY",
        "--validator-private-key=$VALIDATOR1_PRIVATE_KEY",
        "--genesis-validator",
        "--autopropose",
      ]
    ports:
      - "40410:40400"
      - "40411:40401"
      - "40412:40402"
      - "40413:40403"
      - "40414:40404"
      - "40415:40405"
    volumes:
      - ./data/$VALIDATOR1_HOST:/var/lib/rnode/
      - ./conf/shared-rnode.conf:/var/lib/rnode/rnode.conf
      - ./genesis/wallets.txt:/var/lib/rnode/genesis/wallets.txt
      - ./genesis/bonds.txt:/var/lib/rnode/genesis/bonds.txt
      - ./conf/logback.xml:/var/lib/rnode/logback.xml
      - ./certs/validator1/node.certificate.pem:/var/lib/rnode/node.certificate.pem:ro
      - ./certs/validator1/node.key.pem:/var/lib/rnode/node.key.pem:ro

  validator2:
    <<: *default-rnode
    container_name: $VALIDATOR2_HOST
    restart: always
    command:
      [
        "run",
        "--host=$VALIDATOR2_HOST",
        "--allow-private-addresses",
        "--bootstrap=rnode://$BOOTSTRAP_NODE_ID@$BOOTSTRAP_HOST?protocol=40400&discovery=40404",
        "--validator-public-key=$VALIDATOR2_PUBLIC_KEY",
        "--validator-private-key=$VALIDATOR2_PRIVATE_KEY",
        "--genesis-validator",
        "--autopropose",
      ]
    ports:
      - "40420:40400"
      - "40421:40401"
      - "40422:40402"
      - "40423:40403"
      - "40424:40404"
      - "40425:40405"
    volumes:
      - ./data/$VALIDATOR2_HOST:/var/lib/rnode/
      - ./conf/shared-rnode.conf:/var/lib/rnode/rnode.conf
      - ./genesis/wallets.txt:/var/lib/rnode/genesis/wallets.txt
      - ./genesis/bonds.txt:/var/lib/rnode/genesis/bonds.txt
      - ./conf/logback.xml:/var/lib/rnode/logback.xml
      - ./certs/validator2/node.certificate.pem:/var/lib/rnode/node.certificate.pem:ro
      - ./certs/validator2/node.key.pem:/var/lib/rnode/node.key.pem:ro

  validator3:
    <<: *default-rnode
    container_name: $VALIDATOR3_HOST
    restart: always
    command:
      [
        "run",
        "--host=$VALIDATOR3_HOST",
        "--allow-private-addresses",
        "--bootstrap=rnode://$BOOTSTRAP_NODE_ID@$BOOTSTRAP_HOST?protocol=40400&discovery=40404",
        "--validator-public-key=$VALIDATOR3_PUBLIC_KEY",
        "--validator-private-key=$VALIDATOR3_PRIVATE_KEY",
        "--genesis-validator",
        "--autopropose",
      ]
    ports:
      - "40430:40400"
      - "40431:40401"
      - "40432:40402"
      - "40433:40403"
      - "40434:40404"
      - "40435:40405"
    volumes:
      - ./data/$VALIDATOR3_HOST:/var/lib/rnode/
      - ./conf/shared-rnode.conf:/var/lib/rnode/rnode.conf
      - ./genesis/wallets.txt:/var/lib/rnode/genesis/wallets.txt
      - ./genesis/bonds.txt:/var/lib/rnode/genesis/bonds.txt
      - ./conf/logback.xml:/var/lib/rnode/logback.xml
      - ./certs/validator3/node.certificate.pem:/var/lib/rnode/node.certificate.pem:ro
      - ./certs/validator3/node.key.pem:/var/lib/rnode/node.key.pem:ro

  readonly:
    image: f1r3fly-rust-node:local
    user: root
    networks:
      - f1r3fly
    container_name: $READONLY_HOST
    restart: always
    ports:
      - "40451:40401"
      - "40452:40402"
      - "40453:40403"
    command:
    - run
    - --host=$READONLY_HOST
    - --bootstrap=rnode://1e780e5dfbe0a3d9470a2b414f502d59402e09c2@$BOOTSTRAP_HOST?protocol=40400&discovery=40404
    - --no-upnp
    - --allow-private-addresses

    volumes:
      - ./conf/observer.conf:/var/lib/rnode/rnode.conf
      - ./conf/logback.xml:/var/lib/rnode/logback.xml
      - ./genesis/bonds.txt:/var/lib/rnode/genesis/bonds.txt
      - ./genesis/wallets.txt:/var/lib/rnode/genesis/wallets.txt

networks:
  f1r3fly:
    driver: bridge 
